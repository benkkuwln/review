name: Auto Push

on:
  push:
    branches:
      - main # or any branch you want to trigger this on

jobs:
  auto-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js (or your preferred environment)
      uses: actions/setup-node@v2
      with:
        node-version: '14' # specify your Node version

    - name: Install dependencies (if needed)
      run: npm install # or any command specific to your project

    - name: Make changes
      run: |
        echo "New changes made on $(date)" >> changelog.txt
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Commit and push changes
      run: |
        git commit -m "Update changelog"
        git push origin main # push to the main branch
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}