name: steam-reviews

on:
  schedule:
    - cron: '5 * * * *'    # hourly at minute 5 -> scan tracked appids + APPIDS
    - cron: '15 3 * * *'   # daily at 03:15 UTC -> update owned games
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run hourly scan
        env:
          MY_STEAMID64: ${{ secrets.MY_STEAMID64 }}
          APPIDS: ${{ secrets.APPIDS }}
        run: npm run fetch

      - name: Commit data file if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/my-reviews.json || true
          git commit -m "Update my reviews" || echo "no changes"
          git pull --rebase origin main || true
          git push origin HEAD:main

  update-owned:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update owned games (daily)
        env:
          MY_STEAMID64: ${{ secrets.MY_STEAMID64 }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: node scripts/update-owned-games.js

      - name: Commit tracked appids if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.io"
          git add tracked-appids.txt || true
          git commit -m "Update tracked appids" || echo "no changes"
          git push origin HEAD:main