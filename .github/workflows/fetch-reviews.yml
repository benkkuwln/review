name: fetch-steam-reviews
on:
  schedule:
    - cron: '5 * * * *'   # hourly at minute 5
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: npm ci

      - name: Run fetch script
        env:
          MY_STEAMID64: ${{ secrets.MY_STEAMID64 }}
          APPIDS: ${{ secrets.APPIDS }}
        run: npm run fetch

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/my-reviews.json || true
          git commit -m "Update my reviews" || echo "no changes"
          git push origin HEAD:main